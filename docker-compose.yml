services:
  # ── Development (Vite dev server + hot reload) ──
  #   docker compose up -d        → http://localhost:5173
  # Source is bind-mounted, so edits reload live (HMR) — no rebuild needed.
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    image: factstamp:dev
    container_name: factstamp-dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    restart: unless-stopped
